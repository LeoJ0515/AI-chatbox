<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>SYNAPSE // MATRIX</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.1/marked.min.js">
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js">
    </script>
    <style>
        /* ── RESET & ROOT ── */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-deep: #050805;
            --bg-panel: rgba(8, 14, 8, 0.92);
            --glass: rgba(10, 18, 10, 0.85);
            --glass-border: rgba(0, 255, 65, 0.12);
            --matrix-green: #00ff41;
            --matrix-dim: #00cc33;
            --matrix-glow: #00ff41;
            --matrix-dark: #006622;
            --matrix-bg: #0a120a;
            --text: #b0ffb0;
            --text-secondary: #70a070;
            --text-muted: #3a6a3a;
            --danger: #ff4d6a;
            --sidebar-width: 320px;
            --transition: 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        html,
        body {
            background: var(--bg-deep);
            font-family: 'JetBrains Mono', 'Inter', monospace;
            height: 100vh;
            overflow: hidden;
            color: var(--text);
            margin: 0;
        }

        /* ── SCANLINE OVERLAY ── */
        #scanlines {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 9999;
            background: repeating-linear-gradient(0deg,
                    transparent 0px,
                    transparent 3px,
                    rgba(0, 255, 65, 0.015) 3px,
                    rgba(0, 255, 65, 0.015) 4px);
            opacity: 0.5;
        }

        /* ── GRID OVERLAY ── */
        #grid-overlay {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            background-image:
                linear-gradient(rgba(0, 255, 65, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 65, 0.03) 1px, transparent 1px);
            background-size: 40px 40px;
        }

        /* ── MATRIX RAIN CANVAS ── */
        #matrix-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
            opacity: 0.25;
        }

        /* ── ORBS (green glow) ── */
        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(100px);
            pointer-events: none;
            z-index: 0;
            opacity: 0.10;
        }
        .orb-1 {
            width: 600px;
            height: 600px;
            background: var(--matrix-green);
            top: -300px;
            left: -250px;
            animation: orbFloat1 22s infinite alternate ease-in-out;
        }
        .orb-2 {
            width: 500px;
            height: 500px;
            background: var(--matrix-dim);
            bottom: -250px;
            right: -200px;
            animation: orbFloat2 28s infinite alternate ease-in-out;
        }
        @keyframes orbFloat1 {
            0% {
                transform: translate(0, 0);
            }
            100% {
                transform: translate(50px, 40px);
            }
        }
        @keyframes orbFloat2 {
            0% {
                transform: translate(0, 0);
            }
            100% {
                transform: translate(-40px, -50px);
            }
        }

        /* ── MAIN LAYOUT ── */
        .app {
            position: relative;
            z-index: 1;
            display: flex;
            height: 100vh;
            width: 100%;
        }

        /* ── MOBILE MENU ── */
        .menu-toggle {
            position: fixed;
            top: 18px;
            left: 18px;
            z-index: 100;
            width: 44px;
            height: 44px;
            border-radius: 10px;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(0, 255, 65, 0.25);
            display: none;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: var(--transition);
        }
        .menu-toggle:hover {
            border-color: var(--matrix-green);
            box-shadow: 0 0 30px rgba(0, 255, 65, 0.25);
        }
        .menu-toggle span {
            display: block;
            width: 22px;
            height: 2px;
            background: var(--matrix-green);
            position: relative;
            transition: 0.3s;
            box-shadow: 0 0 8px rgba(0, 255, 65, 0.3);
        }
        .menu-toggle span::before,
        .menu-toggle span::after {
            content: '';
            position: absolute;
            width: 22px;
            height: 2px;
            background: var(--matrix-green);
            transition: 0.3s;
            box-shadow: 0 0 8px rgba(0, 255, 65, 0.3);
        }
        .menu-toggle span::before {
            top: -7px;
        }
        .menu-toggle span::after {
            top: 7px;
        }
        .menu-toggle.active span {
            background: transparent;
            box-shadow: none;
        }
        .menu-toggle.active span::before {
            top: 0;
            transform: rotate(45deg);
        }
        .menu-toggle.active span::after {
            top: 0;
            transform: rotate(-45deg);
        }

        /* ── SIDEBAR ── */
        .sidebar {
            width: var(--sidebar-width);
            height: 100%;
            background: var(--bg-panel);
            backdrop-filter: blur(20px);
            border-right: 1px solid var(--glass-border);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            z-index: 50;
            transition: transform var(--transition);
            box-shadow: 4px 0 60px rgba(0, 255, 65, 0.04);
        }
        .sidebar-header {
            padding: 26px 20px 18px;
            border-bottom: 1px solid var(--glass-border);
        }
        .logo {
            font-size: 1.6rem;
            font-weight: 600;
            letter-spacing: 2px;
            color: var(--matrix-green);
            text-shadow: 0 0 30px rgba(0, 255, 65, 0.25), 0 0 60px rgba(0, 255, 65, 0.08);
            margin-bottom: 18px;
            font-family: 'JetBrains Mono', monospace;
        }
        .logo span {
            opacity: 0.4;
            font-weight: 300;
            font-size: 0.7rem;
            letter-spacing: 4px;
            display: block;
            color: var(--text-secondary);
            text-shadow: none;
        }
        .new-chat-btn {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            background: rgba(0, 255, 65, 0.04);
            border: 1px solid rgba(0, 255, 65, 0.2);
            color: var(--matrix-green);
            font-weight: 500;
            font-size: 0.85rem;
            font-family: 'JetBrains Mono', monospace;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            cursor: pointer;
            transition: var(--transition);
            backdrop-filter: blur(10px);
            position: relative;
            overflow: hidden;
            letter-spacing: 0.5px;
        }
        .new-chat-btn::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0, 255, 65, 0.08), transparent);
            transition: left 0.6s;
        }
        .new-chat-btn:hover::after {
            left: 100%;
        }
        .new-chat-btn:hover {
            background: rgba(0, 255, 65, 0.08);
            border-color: var(--matrix-green);
            box-shadow: 0 0 30px rgba(0, 255, 65, 0.15), inset 0 0 30px rgba(0, 255, 65, 0.03);
        }
        .new-chat-btn svg {
            stroke: var(--matrix-green);
            filter: drop-shadow(0 0 6px rgba(0, 255, 65, 0.2));
        }

        .session-list {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 3px;
        }
        .session-list::-webkit-scrollbar {
            width: 4px;
        }
        .session-list::-webkit-scrollbar-track {
            background: transparent;
        }
        .session-list::-webkit-scrollbar-thumb {
            background: var(--matrix-green);
            border-radius: 4px;
            box-shadow: 0 0 12px rgba(0, 255, 65, 0.2);
        }

        .session-item {
            padding: 11px 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid transparent;
            animation: fadeIn 0.2s ease;
        }
        .session-item:hover {
            background: rgba(0, 255, 65, 0.04);
            border-color: rgba(0, 255, 65, 0.06);
        }
        .session-item.active {
            background: rgba(0, 255, 65, 0.06);
            border-color: rgba(0, 255, 65, 0.2);
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.04), inset 0 0 20px rgba(0, 255, 65, 0.02);
        }
        .session-item.active .session-title {
            color: var(--matrix-green);
            text-shadow: 0 0 12px rgba(0, 255, 65, 0.15);
        }
        .session-title {
            font-size: 0.85rem;
            font-family: 'JetBrains Mono', monospace;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 190px;
            letter-spacing: 0.3px;
        }
        .session-time {
            font-size: 0.6rem;
            color: var(--text-muted);
            font-family: 'JetBrains Mono', monospace;
        }
        .delete-session {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 1rem;
            cursor: pointer;
            padding: 4px 6px;
            border-radius: 4px;
            transition: 0.2s;
            display: none;
            font-family: inherit;
        }
        .session-item:hover .delete-session {
            display: block;
        }
        .delete-session:hover {
            color: var(--danger);
            background: rgba(255, 77, 106, 0.15);
        }

        /* ── CHAT CONTAINER ── */
        .chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: rgba(5, 10, 5, 0.5);
            backdrop-filter: blur(8px);
            position: relative;
        }
        .chat-header {
            padding: 18px 28px;
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(0, 0, 0, 0.3);
        }
        .chat-title {
            font-weight: 500;
            font-size: 1rem;
            font-family: 'JetBrains Mono', monospace;
            color: var(--text);
            letter-spacing: 0.5px;
        }
        .chat-title .cursor-blink {
            display: inline-block;
            width: 8px;
            height: 1rem;
            background: var(--matrix-green);
            margin-left: 4px;
            vertical-align: text-bottom;
            animation: blink 1s step-end infinite;
            box-shadow: 0 0 12px var(--matrix-green);
            opacity: 0.6;
        }
        @keyframes blink {
            50% {
                opacity: 0;
            }
        }

        .status-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.7rem;
            color: var(--matrix-green);
            font-family: 'JetBrains Mono', monospace;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        .status-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: var(--matrix-green);
            box-shadow: 0 0 14px var(--matrix-green), 0 0 30px rgba(0, 255, 65, 0.15);
            animation: pulse 1.8s infinite;
        }
        @keyframes pulse {
            0%,
            100% {
                opacity: 1;
                transform: scale(1);
            }
            50% {
                opacity: 0.3;
                transform: scale(0.85);
            }
        }

        /* ── MESSAGES AREA ── */
        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 24px 28px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            scroll-behavior: smooth;
        }
        .messages-area::-webkit-scrollbar {
            width: 4px;
        }
        .messages-area::-webkit-scrollbar-track {
            background: transparent;
        }
        .messages-area::-webkit-scrollbar-thumb {
            background: var(--matrix-green);
            border-radius: 4px;
            box-shadow: 0 0 12px rgba(0, 255, 65, 0.15);
        }

        .message {
            display: flex;
            flex-direction: column;
            max-width: 88%;
            animation: fadeIn 0.25s ease;
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(8px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .message.user {
            align-self: flex-end;
            align-items: flex-end;
        }
        .message.assistant {
            align-self: flex-start;
            align-items: flex-start;
        }

        .bubble {
            padding: 14px 20px;
            border-radius: 16px;
            line-height: 1.6;
            font-size: 0.92rem;
            word-break: break-word;
            transition: var(--transition);
            position: relative;
            font-family: 'JetBrains Mono', monospace;
            border: 1px solid transparent;
        }
        .user .bubble {
            background: rgba(0, 255, 65, 0.06);
            border: 1px solid rgba(0, 255, 65, 0.15);
            border-bottom-right-radius: 4px;
            color: #b0ffb0;
            box-shadow: 0 0 30px rgba(0, 255, 65, 0.02);
        }
        .assistant .bubble {
            background: rgba(8, 16, 8, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 255, 65, 0.08);
            border-bottom-left-radius: 4px;
            color: #c0ffc0;
        }

        /* typing raw */
        .typing-raw {
            font-family: 'JetBrains Mono', monospace;
            white-space: pre-wrap;
            color: #90d090;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(0, 255, 65, 0.12);
            border-radius: 8px;
            padding: 14px 18px;
            line-height: 1.6;
            position: relative;
            font-size: 0.92rem;
        }
        .typing-cursor {
            display: inline-block;
            width: 8px;
            height: 1rem;
            background: var(--matrix-green);
            margin-left: 2px;
            vertical-align: text-bottom;
            animation: blink 0.9s step-end infinite;
            box-shadow: 0 0 14px var(--matrix-green);
        }

        /* Markdown rendered */
        .markdown-body {
            color: inherit;
            line-height: inherit;
            opacity: 0;
            animation: fadeInMarkdown 0.35s ease forwards;
        }
        @keyframes fadeInMarkdown {
            to {
                opacity: 1;
            }
        }
        .markdown-body h1,
        .markdown-body h2,
        .markdown-body h3 {
            color: var(--matrix-green);
            margin: 0.6em 0 0.3em;
            font-weight: 500;
            text-shadow: 0 0 20px rgba(0, 255, 65, 0.08);
        }
        .markdown-body h1 {
            font-size: 1.4rem;
        }
        .markdown-body h2 {
            font-size: 1.2rem;
        }
        .markdown-body h3 {
            font-size: 1rem;
        }
        .markdown-body p {
            margin: 0.4em 0;
        }
        .markdown-body ul,
        .markdown-body ol {
            padding-left: 1.5em;
            margin: 0.4em 0;
        }
        .markdown-body li {
            margin-bottom: 0.2em;
        }
        .markdown-body code {
            background: rgba(0, 255, 65, 0.06);
            padding: 2px 8px;
            border-radius: 4px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85em;
            color: #80d080;
            border: 1px solid rgba(0, 255, 65, 0.06);
        }
        .markdown-body pre {
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(0, 255, 65, 0.08);
            border-radius: 8px;
            padding: 16px;
            overflow-x: auto;
            margin: 0.8em 0;
            position: relative;
        }
        .markdown-body pre code {
            background: none;
            padding: 0;
            border: none;
            color: #b0d0b0;
        }
        .copy-code-btn {
            position: absolute;
            top: 8px;
            right: 8px;
            background: rgba(0, 0, 0, 0.7);
            border: 1px solid rgba(0, 255, 65, 0.15);
            color: var(--text-secondary);
            padding: 4px 12px;
            border-radius: 4px;
            font-size: 0.65rem;
            font-family: 'JetBrains Mono', monospace;
            cursor: pointer;
            transition: 0.2s;
            opacity: 0;
            letter-spacing: 0.5px;
        }
        .markdown-body pre:hover .copy-code-btn {
            opacity: 1;
        }
        .copy-code-btn:hover {
            background: rgba(0, 255, 65, 0.1);
            border-color: var(--matrix-green);
            color: var(--matrix-green);
        }

        /* typing indicator dots */
        .typing-dots {
            display: flex;
            gap: 6px;
            padding: 4px 0;
        }
        .typing-dots span {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: var(--matrix-green);
            border-radius: 50%;
            animation: dotBounce 1.4s infinite ease-in-out;
            box-shadow: 0 0 12px rgba(0, 255, 65, 0.2);
        }
        .typing-dots span:nth-child(2) {
            animation-delay: 0.2s;
        }
        .typing-dots span:nth-child(3) {
            animation-delay: 0.4s;
        }
        @keyframes dotBounce {
            0%,
            60%,
            100% {
                transform: translateY(0);
                opacity: 0.3;
            }
            30% {
                transform: translateY(-8px);
                opacity: 1;
            }
        }

        /* ── INPUT AREA ── */
        .input-area {
            padding: 16px 28px;
            border-top: 1px solid var(--glass-border);
            display: flex;
            gap: 12px;
            align-items: center;
            background: rgba(0, 0, 0, 0.5);
            flex-wrap: wrap;
            position: relative;
            backdrop-filter: blur(8px);
        }
        .drag-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0, 255, 65, 0.03);
            border: 2px dashed rgba(0, 255, 65, 0.15);
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(6px);
            z-index: 10;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.25s;
            font-family: 'JetBrains Mono', monospace;
            color: var(--matrix-green);
            font-size: 0.9rem;
            letter-spacing: 1px;
        }
        .drag-overlay.active {
            opacity: 1;
            pointer-events: all;
        }

        .chat-input {
            flex: 1;
            min-width: 180px;
            background: rgba(0, 20, 0, 0.6);
            border: 1px solid rgba(0, 255, 65, 0.12);
            border-radius: 24px;
            padding: 12px 22px;
            color: #c0ffc0;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.9rem;
            outline: none;
            transition: var(--transition);
            backdrop-filter: blur(5px);
        }
        .chat-input:focus {
            border-color: var(--matrix-green);
            box-shadow: 0 0 30px rgba(0, 255, 65, 0.06), inset 0 0 30px rgba(0, 255, 65, 0.02);
        }
        .chat-input::placeholder {
            color: var(--text-muted);
            font-size: 0.8rem;
        }

        .send-btn {
            background: transparent;
            border: 2px solid var(--matrix-green);
            border-radius: 50%;
            width: 48px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: var(--transition);
            flex-shrink: 0;
            position: relative;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.04);
        }
        .send-btn::before {
            content: '';
            position: absolute;
            inset: 0;
            background: var(--matrix-green);
            opacity: 0;
            border-radius: 50%;
            transition: opacity 0.3s;
        }
        .send-btn:hover::before {
            opacity: 0.08;
        }
        .send-btn:hover {
            box-shadow: 0 0 40px rgba(0, 255, 65, 0.2), inset 0 0 40px rgba(0, 255, 65, 0.02);
            transform: scale(1.04);
            border-color: #00ff55;
        }
        .send-btn svg {
            width: 20px;
            height: 20px;
            fill: var(--matrix-green);
            z-index: 1;
            filter: drop-shadow(0 0 6px rgba(0, 255, 65, 0.15));
        }

        .upload-btn {
            background: rgba(0, 255, 65, 0.03);
            border: 1px solid rgba(0, 255, 65, 0.1);
            border-radius: 50%;
            width: 48px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: var(--transition);
            flex-shrink: 0;
            position: relative;
        }
        .upload-btn:hover {
            background: rgba(0, 255, 65, 0.06);
            border-color: rgba(0, 255, 65, 0.3);
            box-shadow: 0 0 30px rgba(0, 255, 65, 0.04);
        }
        .upload-btn svg {
            width: 20px;
            height: 20px;
            fill: var(--text-secondary);
            transition: 0.2s;
        }
        .upload-btn:hover svg {
            fill: var(--matrix-green);
        }

        .file-preview-container {
            display: flex;
            gap: 8px;
            margin-top: 8px;
            flex-wrap: wrap;
            width: 100%;
        }
        .file-chip {
            background: rgba(0, 255, 65, 0.05);
            border: 1px solid rgba(0, 255, 65, 0.12);
            border-radius: 6px;
            padding: 4px 12px 4px 8px;
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.75rem;
            color: var(--text-secondary);
            animation: fadeIn 0.2s ease;
            font-family: 'JetBrains Mono', monospace;
        }
        .file-chip .file-icon {
            font-size: 0.85rem;
        }
        .file-chip .remove-file {
            cursor: pointer;
            color: var(--text-muted);
            font-weight: bold;
            margin-left: 4px;
            transition: 0.2s;
            font-size: 0.8rem;
        }
        .remove-file:hover {
            color: var(--danger);
        }

        /* ── OVERLAY ── */
        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            z-index: 80;
            display: none;
            backdrop-filter: blur(4px);
        }
        .overlay.show {
            display: block;
        }

        /* ── RESPONSIVE ── */
        @media (max-width: 768px) {
            .menu-toggle {
                display: flex;
            }
            .sidebar {
                position: fixed;
                left: 0;
                top: 0;
                height: 100%;
                transform: translateX(-100%);
                z-index: 90;
                width: 300px;
            }
            .sidebar.open {
                transform: translateX(0);
            }
            .messages-area {
                padding: 20px 16px;
            }
            .input-area {
                padding: 14px 16px;
                flex-wrap: wrap;
            }
            .chat-header {
                padding: 14px 18px;
            }
            .chat-title {
                font-size: 0.85rem;
            }
            .message {
                max-width: 95%;
            }
        }
        @media (max-width: 480px) {
            .sidebar {
                width: 280px;
            }
            .bubble {
                font-size: 0.85rem;
                padding: 12px 16px;
            }
            .chat-input {
                font-size: 0.85rem;
                padding: 10px 16px;
            }
            .send-btn,
            .upload-btn {
                width: 42px;
                height: 42px;
            }
            .send-btn svg,
            .upload-btn svg {
                width: 17px;
                height: 17px;
            }
        }
    </style>
</head>
<body>

    <!-- ── OVERLAYS ── -->
    <div id="scanlines"></div>
    <div id="grid-overlay"></div>
    <canvas id="matrix-canvas"></canvas>

    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <button class="menu-toggle" id="menuToggle"><span></span></button>
    <div class="overlay" id="overlay"></div>

    <div class="app">
        <!-- SIDEBAR -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    SYNAPSE
                    <span>// MATRIX</span>
                </div>
                <button class="new-chat-btn" id="newChatBtn">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                        <path d="M12 5v14M5 12h14" />
                    </svg>
                    + NEW SESSION
                </button>
            </div>
            <div class="session-list" id="sessionList"></div>
        </aside>

        <!-- CHAT -->
        <main class="chat-container">
            <div class="chat-header">
                <span class="chat-title" id="chatTitle">
                    <span id="chatTitleText">General</span>
                    <span class="cursor-blink"></span>
                </span>
                <div class="status-badge">
                    <span class="status-dot"></span>
                    <span>ONLINE</span>
                </div>
            </div>

            <div class="messages-area" id="messagesArea"></div>

            <div class="input-area" id="inputArea">
                <div class="drag-overlay" id="dragOverlay">
                    <span>⏎ DROP FILES</span>
                </div>
                <input type="text" class="chat-input" id="userInput" placeholder="> _ message..." autofocus />
                <label class="upload-btn" for="fileInput" title="Attach files">
                    <svg viewBox="0 0 24 24"><path d="M16.5 6v11.5c0 2.21-1.79 4-4 4s-4-1.79-4-4V5c0-1.38 1.12-2.5 2.5-2.5s2.5 1.12 2.5 2.5v10.5c0 .55-.45 1-1 1s-1-.45-1-1V6H10v9.5c0 1.38 1.12 2.5 2.5 2.5s2.5-1.12 2.5-2.5V5c0-2.21-1.79-4-4-4S7 2.79 7 5v12.5c0 3.04 2.46 5.5 5.5 5.5s5.5-2.46 5.5-5.5V6h-1.5z"/></svg>
                </label>
                <input type="file" id="fileInput" multiple hidden />
                <button class="send-btn" id="sendBtn">
                    <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2v7z"/></svg>
                </button>
                <div class="file-preview-container" id="filePreview"></div>
            </div>
        </main>
    </div>

    <script>
        (function() {
            // ─── CONFIG ──────────────────────────────────────────────
            const API_URL = "http://localhost:8000/chat";
            const STORAGE_KEY = "synapse_sessions";
            const CHAT_PREFIX = "synapse_chat_";

            // ─── STATE ──────────────────────────────────────────────
            let currentSessionId = null;
            let sessions = [];
            let isWaiting = false;
            let attachedFiles = [];

            // ─── DOM ──────────────────────────────────────────────────
            const sidebar = document.getElementById("sidebar");
            const menuToggle = document.getElementById("menuToggle");
            const overlay = document.getElementById("overlay");
            const sessionList = document.getElementById("sessionList");
            const messagesArea = document.getElementById("messagesArea");
            const userInput = document.getElementById("userInput");
            const sendBtn = document.getElementById("sendBtn");
            const newChatBtn = document.getElementById("newChatBtn");
            const chatTitleText = document.getElementById("chatTitleText");
            const fileInput = document.getElementById("fileInput");
            const filePreview = document.getElementById("filePreview");
            const dragOverlay = document.getElementById("dragOverlay");

            // ─── MATRIX RAIN ────────────────────────────────────────
            const matrixCanvas = document.getElementById('matrix-canvas');
            const mctx = matrixCanvas.getContext('2d');
            let rainDrops = [];
            let matrixCols = 0;

            function resizeMatrix() {
                matrixCanvas.width = window.innerWidth;
                matrixCanvas.height = window.innerHeight;
                matrixCols = Math.floor(matrixCanvas.width / 20);
                rainDrops = [];
                for (let i = 0; i < matrixCols; i++) {
                    rainDrops.push({
                        x: i * 20,
                        y: Math.random() * matrixCanvas.height,
                        speed: 0.5 + Math.random() * 1.5,
                        length: 10 + Math.floor(Math.random() * 20),
                        chars: '0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('')
                    });
                }
            }
            window.addEventListener('resize', resizeMatrix);
            resizeMatrix();

            function drawMatrixRain() {
                mctx.fillStyle = 'rgba(5, 8, 5, 0.05)';
                mctx.fillRect(0, 0, matrixCanvas.width, matrixCanvas.height);
                mctx.font = '14px "JetBrains Mono", monospace';
                for (let d of rainDrops) {
                    const char = d.chars[Math.floor(Math.random() * d.chars.length)];
                    const brightness = 0.15 + (d.y / matrixCanvas.height) * 0.5;
                    const green = Math.floor(80 + 175 * brightness);
                    mctx.fillStyle = `rgba(0, ${green}, 30, ${0.4 + 0.3 * brightness})`;
                    mctx.fillText(char, d.x, d.y);
                    d.y += d.speed;
                    if (d.y > matrixCanvas.height + 20) {
                        d.y = -20;
                        d.speed = 0.5 + Math.random() * 1.5;
                    }
                }
                requestAnimationFrame(drawMatrixRain);
            }
            drawMatrixRain();

            // ─── GLOW PARTICLES ─────────────────────────────────────
            const canvas = document.createElement('canvas');
            canvas.style.position = 'fixed';
            canvas.style.top = '0';
            canvas.style.left = '0';
            canvas.style.width = '100%';
            canvas.style.height = '100%';
            canvas.style.pointerEvents = 'none';
            canvas.style.zIndex = '0';
            canvas.style.opacity = '0.35';
            document.body.appendChild(canvas);

            const ctx = canvas.getContext('2d');
            let particles = [];
            let mouseX = -1000,
                mouseY = -1000;

            function resizeParticles() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }
            window.addEventListener('resize', resizeParticles);
            resizeParticles();

            class Particle {
                constructor() {
                    this.reset();
                }
                reset() {
                    this.x = Math.random() * canvas.width;
                    this.y = Math.random() * canvas.height;
                    this.size = Math.random() * 2 + 0.5;
                    this.speedX = (Math.random() - 0.5) * 0.4;
                    this.speedY = (Math.random() - 0.5) * 0.4;
                    this.opacity = Math.random() * 0.4 + 0.1;
                    this.pulse = Math.random() * Math.PI * 2;
                }
                update() {
                    const dx = mouseX - this.x;
                    const dy = mouseY - this.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < 180) {
                        const force = (180 - dist) / 180 * 0.015;
                        this.speedX += dx * force * 0.001;
                        this.speedY += dy * force * 0.001;
                    }
                    this.x += this.speedX;
                    this.y += this.speedY;
                    this.speedX *= 0.99;
                    this.speedY *= 0.99;
                    this.pulse += 0.02;
                    if (this.x < 0 || this.x > canvas.width || this.y < 0 || this.y > canvas.height) {
                        this.reset();
                    }
                }
                draw() {
                    const glow = 0.5 + 0.5 * Math.sin(this.pulse);
                    const alpha = this.opacity * (0.6 + 0.4 * glow);
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size * (1 + 0.3 * glow), 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(0, 255, 65, ${alpha})`;
                    ctx.fill();
                    if (this.size > 1.2) {
                        ctx.shadowColor = 'rgba(0, 255, 65, 0.15)';
                        ctx.shadowBlur = 12;
                        ctx.fill();
                        ctx.shadowBlur = 0;
                    }
                }
            }

            for (let i = 0; i < 120; i++) particles.push(new Particle());

            function animateParticles() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                particles.forEach(p => {
                    p.update();
                    p.draw();
                });
                // connections
                for (let i = 0; i < particles.length; i++) {
                    for (let j = i + 1; j < particles.length; j++) {
                        const dx = particles[i].x - particles[j].x;
                        const dy = particles[i].y - particles[j].y;
                        const dist = Math.sqrt(dx * dx + dy * dy);
                        if (dist < 80) {
                            ctx.beginPath();
                            ctx.moveTo(particles[i].x, particles[i].y);
                            ctx.lineTo(particles[j].x, particles[j].y);
                            ctx.strokeStyle = `rgba(0, 255, 65, ${0.03 * (1 - dist / 80)})`;
                            ctx.lineWidth = 0.4;
                            ctx.stroke();
                        }
                    }
                }
                requestAnimationFrame(animateParticles);
            }
            animateParticles();

            window.addEventListener('mousemove', (e) => {
                mouseX = e.clientX;
                mouseY = e.clientY;
            });

            // ─── SESSION MANAGEMENT ──────────────────────────────────
            function loadSessions() {
                const stored = localStorage.getItem(STORAGE_KEY);
                if (stored) {
                    try { sessions = JSON.parse(stored); } catch { sessions = []; }
                }
                if (sessions.length === 0) {
                    const defaultId = generateId();
                    sessions = [{ id: defaultId, title: "General", lastActive: Date.now() }];
                    saveSessions();
                    saveChatHistory(defaultId, []);
                }
                currentSessionId = sessions[0].id;
                renderSessions();
                switchSession(currentSessionId);
            }

            function saveSessions() {
                localStorage.setItem(STORAGE_KEY, JSON.stringify(sessions));
            }

            function generateId() {
                return 'sn_' + Math.random().toString(36).substr(2, 9) + '_' + Date.now().toString(36);
            }

            function getChatHistory(sessionId) {
                const raw = localStorage.getItem(CHAT_PREFIX + sessionId);
                return raw ? JSON.parse(raw) : [];
            }

            function saveChatHistory(sessionId, messages) {
                localStorage.setItem(CHAT_PREFIX + sessionId, JSON.stringify(messages));
            }

            function renderSessions() {
                sessionList.innerHTML = '';
                sessions.sort((a, b) => b.lastActive - a.lastActive).forEach(s => {
                    const item = document.createElement('div');
                    item.className = `session-item${s.id === currentSessionId ? ' active' : ''}`;
                    item.innerHTML = `
                        <div>
                            <div class="session-title">${escapeHtml(s.title || 'Untitled')}</div>
                            <div class="session-time">${formatTime(s.lastActive)}</div>
                        </div>
                        <button class="delete-session" data-id="${s.id}">✕</button>
                    `;
                    item.addEventListener('click', (e) => {
                        if (e.target.classList.contains('delete-session')) return;
                        switchSession(s.id);
                    });
                    item.querySelector('.delete-session').addEventListener('click', (e) => {
                        e.stopPropagation();
                        deleteSession(s.id);
                    });
                    sessionList.appendChild(item);
                });
                const active = sessions.find(s => s.id === currentSessionId);
                if (active) chatTitleText.textContent = active.title || 'General';
            }

            function switchSession(sessionId) {
                if (isWaiting) return;
                currentSessionId = sessionId;
                const messages = getChatHistory(sessionId);
                renderMessages(messages);
                renderSessions();
                closeMobileSidebar();
                userInput.focus();
            }

            function deleteSession(sessionId) {
                if (sessions.length <= 1) return;
                localStorage.removeItem(CHAT_PREFIX + sessionId);
                sessions = sessions.filter(s => s.id !== sessionId);
                saveSessions();
                if (currentSessionId === sessionId) {
                    currentSessionId = sessions[0].id;
                    switchSession(currentSessionId);
                } else {
                    renderSessions();
                }
            }

            function newSession() {
                if (isWaiting) return;
                const newId = generateId();
                const newSess = { id: newId, title: "New Session", lastActive: Date.now() };
                sessions.unshift(newSess);
                saveSessions();
                saveChatHistory(newId, []);
                currentSessionId = newId;
                renderMessages([]);
                renderSessions();
                closeMobileSidebar();
                userInput.focus();
            }

            // ─── MESSAGE RENDERING ──────────────────────────────────
            function renderMessages(messages) {
                messagesArea.innerHTML = '';
                messages.forEach(msg => addMessageBubble(msg.role, msg.content, false));
                scrollToBottom();
            }

            function addMessageBubble(role, content, scroll = true) {
                const msgDiv = document.createElement('div');
                msgDiv.className = `message ${role}`;
                const bubble = document.createElement('div');
                bubble.className = 'bubble';
                msgDiv.appendChild(bubble);
                if (role === 'assistant' && content) {
                    bubble.innerHTML = `<div class="markdown-body">${marked.parse(content)}</div>`;
                    bubble.querySelectorAll('pre code').forEach(block => hljs.highlightElement(block));
                    addCopyButtons(bubble);
                } else {
                    bubble.textContent = content;
                }
                messagesArea.appendChild(msgDiv);
                if (scroll) scrollToBottom();
                return { msgDiv, bubble };
            }

            function addCopyButtons(container) {
                container.querySelectorAll('pre').forEach(pre => {
                    if (pre.querySelector('.copy-code-btn')) return;
                    const btn = document.createElement('button');
                    btn.className = 'copy-code-btn';
                    btn.textContent = 'COPY';
                    btn.addEventListener('click', () => {
                        const code = pre.querySelector('code');
                        if (code) {
                            navigator.clipboard.writeText(code.innerText).then(() => {
                                btn.textContent = '✓';
                                setTimeout(() => btn.textContent = 'COPY', 1200);
                            });
                        }
                    });
                    pre.appendChild(btn);
                });
            }

            function scrollToBottom() {
                messagesArea.scrollTop = messagesArea.scrollHeight;
            }

            // ─── TYPING & MARKDOWN MORPH ─────────────────────────────
            function typeTextAndMorph(bubble, rawText, speed = 14) {
                return new Promise(resolve => {
                    const rawDiv = document.createElement('div');
                    rawDiv.className = 'typing-raw';
                    bubble.innerHTML = '';
                    bubble.appendChild(rawDiv);

                    const cursor = document.createElement('span');
                    cursor.className = 'typing-cursor';
                    rawDiv.appendChild(document.createTextNode(''));
                    rawDiv.appendChild(cursor);

                    let i = 0;
                    const interval = setInterval(() => {
                        if (i < rawText.length) {
                            rawDiv.insertBefore(document.createTextNode(rawText.charAt(i)), cursor);
                            i++;
                            scrollToBottom();
                        } else {
                            clearInterval(interval);
                            cursor.remove();
                            setTimeout(() => {
                                const markdownHTML = marked.parse(rawText);
                                bubble.innerHTML = `<div class="markdown-body">${markdownHTML}</div>`;
                                bubble.querySelectorAll('pre code').forEach(block => hljs.highlightElement(
                                block));
                                addCopyButtons(bubble);
                                scrollToBottom();
                                resolve();
                            }, 180);
                        }
                    }, speed);
                });
            }

            // ─── TYPING INDICATOR ────────────────────────────────────
            function showTypingIndicator() {
                const msgDiv = document.createElement('div');
                msgDiv.className = 'message assistant';
                const bubble = document.createElement('div');
                bubble.className = 'bubble';
                bubble.style.padding = '14px 20px';
                const dots = document.createElement('div');
                dots.className = 'typing-dots';
                for (let i = 0; i < 3; i++) {
                    const dot = document.createElement('span');
                    dots.appendChild(dot);
                }
                bubble.appendChild(dots);
                msgDiv.appendChild(bubble);
                messagesArea.appendChild(msgDiv);
                scrollToBottom();
                return msgDiv;
            }

            function removeTypingIndicator(el) {
                if (el && el.parentNode) el.remove();
            }

            // ─── FILE HANDLING ──────────────────────────────────────
            function getFileIcon(file) {
                const ext = file.name.split('.').pop().toLowerCase();
                if (['jpg', 'jpeg', 'png', 'gif', 'webp'].includes(ext)) return '🖼';
                if (['pdf'].includes(ext)) return '📄';
                if (['doc', 'docx'].includes(ext)) return '📝';
                if (['xls', 'xlsx', 'csv'].includes(ext)) return '📊';
                if (['txt', 'md', 'json', 'py', 'js', 'html', 'css'].includes(ext)) return '📃';
                return '📎';
            }

            function updateFilePreview() {
                filePreview.innerHTML = '';
                attachedFiles.forEach((file, idx) => {
                    const chip = document.createElement('div');
                    chip.className = 'file-chip';
                    const iconSpan = document.createElement('span');
                    iconSpan.className = 'file-icon';
                    iconSpan.textContent = getFileIcon(file);
                    chip.appendChild(iconSpan);
                    const nameSpan = document.createElement('span');
                    nameSpan.textContent = file.name.length > 24 ? file.name.substring(0, 21) + '…' : file.name;
                    chip.appendChild(nameSpan);
                    const removeBtn = document.createElement('span');
                    removeBtn.className = 'remove-file';
                    removeBtn.textContent = '✕';
                    removeBtn.onclick = () => {
                        attachedFiles.splice(idx, 1);
                        updateFilePreview();
                    };
                    chip.appendChild(removeBtn);
                    filePreview.appendChild(chip);
                });
            }

            function addFiles(files) {
                for (let f of files) {
                    const reader = new FileReader();
                    reader.onload = (ev) => {
                        attachedFiles.push({
                            name: f.name,
                            type: f.type,
                            data: ev.target.result.split(',')[1],
                            blob: f
                        });
                        updateFilePreview();
                    };
                    reader.readAsDataURL(f);
                }
            }

            fileInput.addEventListener('change', (e) => {
                if (e.target.files.length) {
                    addFiles(e.target.files);
                    fileInput.value = '';
                }
            });

            const inputArea = document.getElementById('inputArea');
            inputArea.addEventListener('dragover', (e) => {
                e.preventDefault();
                dragOverlay.classList.add('active');
            });
            inputArea.addEventListener('dragleave', (e) => {
                e.preventDefault();
                dragOverlay.classList.remove('active');
            });
            inputArea.addEventListener('drop', (e) => {
                e.preventDefault();
                dragOverlay.classList.remove('active');
                if (e.dataTransfer.files.length) {
                    addFiles(e.dataTransfer.files);
                }
            });

            // ─── SEND MESSAGE ────────────────────────────────────────
            async function sendMessage() {
                if (isWaiting) return;
                const text = userInput.value.trim();
                if (!text && attachedFiles.length === 0) return;
                if (!currentSessionId) newSession();

                isWaiting = true;
                userInput.disabled = true;

                let userContent = text;
                if (attachedFiles.length > 0) {
                    userContent += '\n[Attached: ' + attachedFiles.map(f => f.name).join(', ') + ']';
                }
                addMessageBubble('user', userContent);
                const history = getChatHistory(currentSessionId);
                history.push({ role: 'user', content: userContent });
                saveChatHistory(currentSessionId, history);

                const sess = sessions.find(s => s.id === currentSessionId);
                if (sess && (sess.title === 'New Session' || sess.title === 'General')) {
                    sess.title = text.substring(0, 30) || 'File upload';
                    sess.lastActive = Date.now();
                    saveSessions();
                    renderSessions();
                } else if (sess) {
                    sess.lastActive = Date.now();
                    saveSessions();
                    renderSessions();
                }

                userInput.value = '';
                const typingIndicator = showTypingIndicator();

                try {
                    const payload = {
                        session_id: currentSessionId,
                        message: text,
                        files: attachedFiles.length > 0 ? attachedFiles.map(f => ({
                            name: f.name,
                            type: f.type,
                            data: f.data
                        })) : undefined
                    };
                    const response = await fetch(API_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                    if (!response.ok) {
                        const errData = await response.json();
                        throw new Error(errData.detail || 'Request failed');
                    }
                    const data = await response.json();
                    const reply = data.reply;

                    removeTypingIndicator(typingIndicator);

                    const { bubble } = addMessageBubble('assistant', '', false);
                    await typeTextAndMorph(bubble, reply);

                    history.push({ role: 'assistant', content: reply });
                    saveChatHistory(currentSessionId, history);
                    attachedFiles = [];
                    updateFilePreview();
                } catch (error) {
                    removeTypingIndicator(typingIndicator);
                    const { bubble } = addMessageBubble('assistant', '');
                    bubble.innerHTML = `<span style="color:#ff4d6a;">⚠ ${error.message}</span>`;
                } finally {
                    isWaiting = false;
                    userInput.disabled = false;
                    userInput.focus();
                }
            }

            // ─── EVENT LISTENERS ────────────────────────────────────
            sendBtn.addEventListener('click', sendMessage);
            userInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    sendMessage();
                }
            });
            newChatBtn.addEventListener('click', newSession);
            menuToggle.addEventListener('click', () => {
                sidebar.classList.toggle('open');
                overlay.classList.toggle('show');
                menuToggle.classList.toggle('active');
            });
            overlay.addEventListener('click', () => {
                sidebar.classList.remove('open');
                overlay.classList.remove('show');
                menuToggle.classList.remove('active');
            });

            function closeMobileSidebar() {
                sidebar.classList.remove('open');
                overlay.classList.remove('show');
                menuToggle.classList.remove('active');
            }

            // ─── UTILS ──────────────────────────────────────────────
            function escapeHtml(text) {
                return String(text).replace(/[&<>"]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' } [
                    m
                ]));
            }

            function formatTime(timestamp) {
                return new Date(timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            }

            // ─── INIT ────────────────────────────────────────────────
            loadSessions();
        })();
    </script>
</body>
</html>
